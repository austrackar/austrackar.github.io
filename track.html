<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RutaSegura AR — Compartir Ubicación</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; margin-top: 40px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: #8b949e; font-size: 14px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; margin-top: 12px; }
    input, select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; color: #e6edf3; font-size: 16px; }
    input:focus { outline: none; border-color: #58a6ff; }
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
    .btn-primary { background: #238636; color: white; }
    .btn-primary:hover { background: #2ea043; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: #da3633; color: white; }
    .btn-danger:hover { background: #f85149; }
    .status-box { margin-top: 16px; padding: 14px; border-radius: 10px; text-align: center; font-size: 14px; display: none; }
    .status-ok { display: block; background: rgba(35,134,54,0.15); border: 1px solid #238636; color: #3fb950; }
    .status-err { display: block; background: rgba(218,54,51,0.15); border: 1px solid #da3633; color: #f85149; }
    .coords { font-size: 11px; color: #8b949e; text-align: center; margin-top: 8px; word-break: break-all; }
    .badge { display: inline-block; background: #1f6feb; color: white; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-top: 8px; }
    .footer { margin-top: 20px; font-size: 12px; color: #484f58; text-align: center; }
  </style>
</head>
<body>

<div class="card">
  <h1>🚛 Compartir ubicación</h1>
  <p class="sub">Tu jefe va a poder verte en el mapa de RutaSegura AR</p>

  <label>Tu nombre</label>
  <input type="text" id="emp-name" placeholder="Ej: Juan Pérez" autocomplete="off">

  <label>Ruta que estás haciendo</label>
  <select id="emp-ruta">
    <option value="">— Seleccioná una ruta —</option>
    <option value="RN 3">RN 3 — Buenos Aires → Patagonia</option>
    <option value="RN 7">RN 7 — Buenos Aires → Mendoza</option>
    <option value="RN 9">RN 9 — Buenos Aires → Salta / Jujuy</option>
    <option value="RN 40">RN 40 — La Quiaca → Cabo Vírgenes</option>
    <option value="RN 14">RN 14 — Mesopotamia</option>
    <option value="RN 33">RN 33 — Buenos Aires → Bahía Blanca</option>
    <option value="RN A004">Otra ruta</option>
  </select>

  <button class="btn btn-primary" id="btn-start" disabled>▶ Empezar a compartir</button>
  <button class="btn btn-danger" id="btn-stop" style="display:none">■ Dejar de compartir</button>

  <div id="status" class="status-box"></div>
  <div id="coords" class="coords"></div>
  <div id="badge-area"></div>
</div>

<div class="footer">
  RutaSegura AR — La ubicación se envía cada 10 segundos mientras esté abierta esta página.
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
let watchId = null;
let intervalId = null;
let empId = null;
let trackEmpresa = '';

const nameInput = document.getElementById('emp-name');
const rutaSelect = document.getElementById('emp-ruta');
const btnStart = document.getElementById('btn-start');
const btnStop = document.getElementById('btn-stop');
const statusEl = document.getElementById('status');
const coordsEl = document.getElementById('coords');
const badgeArea = document.getElementById('badge-area');

// Init auth and wait for login
initAuth();
onAuthReady((user, profile) => {
  if (!user || !profile || profile.rol !== 'empleado') {
    window.location.href = 'login.html';
    return;
  }
  trackEmpresa = profile.empresa;
  nameInput.value = profile.nombre || '';
  nameInput.disabled = true;
  btnStart.disabled = false;
  statusEl.textContent = '✅ Conectado como ' + profile.nombre + ' (' + profile.empresa + ')';
  statusEl.className = 'status-box status-ok';
});

function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status-box status-' + type;
}

function updateCoords(lat, lng) {
  coordsEl.textContent = `📡 ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
}

function startSharing() {
  const nombre = nameInput.value.trim();
  const ruta = rutaSelect.value;
  if (!nombre || !trackEmpresa) return;

  // Use uid as employee ID
  empId = firebase.auth().currentUser.uid;

  function sendLocation() {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const data = {
          nombre,
          ruta: ruta || '',
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          timestamp: Date.now(),
          activo: true
        };
        firebase.database().ref('flota/' + trackEmpresa + '/' + empId).set(data);
        updateCoords(pos.coords.latitude, pos.coords.longitude);
        setStatus('✅ Ubicación enviada — te estamos viendo 📡', 'ok');
      },
      err => {
        console.warn('GPS error:', err.message);
        if (err.code === 1) setStatus('⚠️ Permiso de ubicación denegado. Activá GPS en Chrome > Configuración > Ubicación', 'err');
        else setStatus('⚠️ Error de GPS: ' + err.message, 'err');
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
    );
  }

  sendLocation();
  intervalId = setInterval(sendLocation, 10000);

  watchId = navigator.geolocation.watchPosition(
    pos => {
      const data = {
        nombre,
        ruta: ruta || '',
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        timestamp: Date.now(),
        activo: true
      };
      firebase.database().ref('flota/' + trackEmpresa + '/' + empId).set(data);
      updateCoords(pos.coords.latitude, pos.coords.longitude);
    },
      err => {
        console.warn('watchPosition error:', err.message);
        if (err.code === 1) setStatus('⚠️ Permiso de ubicación denegado. Activá GPS en Chrome > Configuración > Ubicación', 'err');
      },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
  );

  btnStart.style.display = 'none';
  btnStop.style.display = 'block';
  rutaSelect.disabled = true;
  badgeArea.innerHTML = '<span class="badge">🟢 Compartiendo ubicación</span>';
}

function stopSharing() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }

  if (empId && trackEmpresa) {
    firebase.database().ref('flota/' + trackEmpresa + '/' + empId).update({ activo: false, timestamp: Date.now() });
  }

  btnStart.style.display = 'block';
  btnStop.style.display = 'none';
  rutaSelect.disabled = false;
  badgeArea.innerHTML = '<span class="badge" style="background:#6b7280">🔴 No compartiendo</span>';
  setStatus('Dejaste de compartir ubicación', 'err');
}

btnStart.addEventListener('click', startSharing);
btnStop.addEventListener('click', stopSharing);

window.addEventListener('beforeunload', () => {
  if (intervalId) clearInterval(intervalId);
  if (watchId) navigator.geolocation.clearWatch(watchId);
});
</script>
</body>
</html>
