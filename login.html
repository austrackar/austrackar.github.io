<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AusTrack — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 32px; width: 100%; max-width: 420px; }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .login-logo { height: 48px; width: auto; }
    .logo-text { font-weight: 800; font-size: 20px; }
    .logo-sub { color: #8b949e; font-size: 13px; }
    .tabs { display: flex; background: #0d1117; border-radius: 12px; padding: 4px; margin-bottom: 24px; border: 1px solid #30363d; }
    .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; color: #8b949e; transition: all 0.2s; border: none; background: none; font-family: inherit; }
    .tab.active { background: #1f6feb; color: white; }
    .form { display: none; }
    .form.active { display: block; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; margin-top: 14px; }
    input, select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; color: #e6edf3; font-size: 15px; font-family: inherit; }
    input:focus, select:focus { outline: none; border-color: #58a6ff; }
    select option { background: #161b22; }
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 18px; transition: all 0.2s; font-family: inherit; }
    .btn-primary { background: #238636; color: white; }
    .btn-primary:hover { background: #2ea043; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #f85149; font-size: 13px; margin-top: 10px; display: none; padding: 10px; background: rgba(248,81,73,0.1); border-radius: 8px; border: 1px solid rgba(248,81,73,0.3); }
    .footer { margin-top: 20px; font-size: 12px; color: #484f58; text-align: center; }
    .inline-flex { display: flex; gap: 12px; }
    .inline-flex > * { flex: 1; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">

    <div>
      <img src="img/logo.png" class="login-logo" alt="AusTrack">
      <div class="logo-text">AusTrack</div>
      <div class="logo-sub">Sistema de Monitoreo Vial</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="login">Iniciar Sesión</button>
    <button class="tab" data-tab="register">Registrarse</button>
  </div>

  <!-- LOGIN -->
  <div id="login-form" class="form active">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    <div id="login-error" class="error"></div>
    <button class="btn btn-primary" id="login-btn">Ingresar</button>
  </div>

  <!-- REGISTER -->
  <div id="register-form" class="form">
    <div class="inline-flex">
      <div style="flex:1">
        <label>Nombre</label>
        <input type="text" id="reg-name" placeholder="Tu nombre" autocomplete="name">
      </div>
      <div style="flex:1">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="tu@email.com" autocomplete="email">
      </div>
    </div>
    <div class="inline-flex">
      <div style="flex:1">
        <label>Empresa</label>
        <input type="text" id="reg-empresa" placeholder="Nombre de tu empresa">
      </div>
      <div style="flex:1">
        <label>Rol</label>
        <select id="reg-rol">
          <option value="dueño">Dueño / Admin</option>
          <option value="empleado">Empleado / Chofer</option>
        </select>
      </div>
    </div>
    <label>Contraseña</label>
    <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    <div id="reg-error" class="error"></div>
    <button class="btn btn-primary" id="reg-btn">Crear cuenta</button>
  </div>

  <div class="footer">AusTrack — Datos protegidos</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab + '-form').classList.add('active');
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('reg-error').style.display = 'none';
  });
});

function showErr(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}

// Init auth
initAuth();

// Redirect if already logged in
onAuthReady((user, profile) => {
  if (user && profile) {
    window.location.href = 'index.html';
  }
});

// LOGIN
document.getElementById('login-btn').addEventListener('click', () => {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!email || !pass) { showErr(errEl, 'Completá todos los campos'); return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Ingresando...';
  login(email, pass)
    .then(() => window.location.href = 'index.html')
    .catch(e => { showErr(errEl, e.message.replace('Firebase: ', '').replace(/\(.*\)/, '')); btn.disabled = false; btn.textContent = 'Ingresar'; });
});

// REGISTER
document.getElementById('reg-btn').addEventListener('click', () => {
  const nombre = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const empresa = document.getElementById('reg-empresa').value.trim();
  const rol = document.getElementById('reg-rol').value;
  const pass = document.getElementById('reg-pass').value;
  const btn = document.getElementById('reg-btn');
  const errEl = document.getElementById('reg-error');
  errEl.style.display = 'none';
  if (!nombre || !email || !empresa || !pass) { showErr(errEl, 'Completá todos los campos'); return; }
  if (pass.length < 6) { showErr(errEl, 'La contraseña debe tener al menos 6 caracteres'); return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Creando cuenta...';
  register(email, pass, nombre, empresa, rol)
    .then(() => { window.location.href = 'index.html'; })
    .catch(e => { showErr(errEl, e.message.replace('Firebase: ', '').replace(/\(.*\)/, '')); btn.disabled = false; btn.textContent = 'Crear cuenta'; });
});

// Enter key support
document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const activeTab = document.querySelector('.tab.active');
      if (activeTab.dataset.tab === 'login') document.getElementById('login-btn').click();
      else document.getElementById('reg-btn').click();
    }
  });
});
</script>
</body>
</html>
